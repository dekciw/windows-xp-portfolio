<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub - dekciw</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .message {
      padding: 40px;
    }

    .message h1 {
      color: #58a6ff;
      font-size: 28px;
      margin-bottom: 20px;
    }

    .message p {
      font-size: 16px;
      line-height: 1.6;
      margin: 10px 0;
    }

    .spinner {
      width: 50px;
      height: 50px;
      margin: 20px auto;
      border: 4px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="message">
    <div class="spinner"></div>
    <h1>🌐 Открытие GitHub профиля...</h1>
    <p>Профиль откроется в новой вкладке браузера</p>
    <p style="color: #8b949e; font-size: 14px; margin-top: 30px;">
      ℹ️ GitHub блокирует встраивание из соображений безопасности
    </p>
  </div>

  <script>
    // Автоматически открыть GitHub в новой вкладке при загрузке
    window.addEventListener('load', () => {
      setTimeout(() => {
        window.open('https://github.com/dekciw', '_blank');
      }, 500);
    });
  </script>
</body>
</html>
