<div class="Internet_Explorer_6_Body">
  <section class="IE_toolbar">
    <div class="IE_options">
      <div class="IE_options_OCD">
        <div class="drop_down"><div class="drop_down_label">Файл</div></div>
        <div class="drop_down"><div class="drop_down_label">Правка</div></div>
        <div class="drop_down"><div class="drop_down_label">Вид</div></div>
        <div class="drop_down">
          <div class="drop_down_label">Избранное</div>
        </div>
        <div class="drop_down"><div class="drop_down_label">Сервис</div></div>
        <div class="drop_down"><div class="drop_down_label">Справка</div></div>
      </div>
    </div>
    <img
      class="IE_windows-logo"
      src="/Assets/Images/Logos/windows-xp-logo-white-small.png"
      alt="windows"
    />
  </section>
  <section class="IE_function_bar">
    <div class="IE_function_bar_button--disable">
      <img
        class="IE_function_bar_icon"
        src="/Assets/Windows XP High Resolution Icon Pack avec MAOSX/Windows XP High Resolution Icon Pack/Windows XP Icons/Back.png"
        alt=""
      /><span class="IE_function_bar_text">Назад</span>
      <div class="IE_function_bar_arrow"></div>
    </div>
    <div class="IE_function_bar_button--disable">
      <img
        class="IE_function_bar_icon"
        src="/Assets/Windows XP High Resolution Icon Pack avec MAOSX/Windows XP High Resolution Icon Pack/Windows XP Icons/Forward.png"
        alt=""
      />
      <div class="IE_function_bar_arrow"></div>
    </div>
    <div class="IE_function_bar_button--disable">
      <img
        class="IE_function_bar_icon--margin-1"
        src="/Assets/Windows XP High Resolution Icon Pack avec MAOSX/Windows XP High Resolution Icon Pack/Windows XP Icons/IE Stop.png"
        alt=""
      />
    </div>
    <div class="IE_function_bar_button" id="ie-refresh-button">
      <img
        class="IE_function_bar_icon--margin-1"
        src="/Assets/Windows XP High Resolution Icon Pack avec MAOSX/Windows XP High Resolution Icon Pack/Windows XP Icons/IE Refresh.png"
        alt=""
      />
    </div>
    <div class="IE_function_bar_button" id="ie-home-button">
      <img
        class="IE_function_bar_icon--margin-1"
        src="/Assets/Windows XP High Resolution Icon Pack avec MAOSX/Windows XP High Resolution Icon Pack/Windows XP Icons/IE Home.png"
        alt=""
      />
    </div>
    <div class="IE_function_bar_separate"></div>
    <div class="IE_function_bar_button--disable">
      <img
        class="IE_function_bar_icon--normalize"
        src="/Assets/Windows XP High Resolution Icon Pack avec MAOSX/Windows XP High Resolution Icon Pack/Windows XP Icons/Search.png"
        alt=""
      /><span class="IE_function_bar_text">Поиск</span>
    </div>
    <div class="IE_function_bar_button" id="ie-favorites-button">
      <img
        class="IE_function_bar_icon--normalize"
        src="/Assets/Windows XP High Resolution Icon Pack avec MAOSX/Windows XP High Resolution Icon Pack/Windows XP Icons/Favorites.png"
        alt=""
      /><span class="IE_function_bar_text">Избранное</span>
    </div>
    <div class="IE_function_bar_button">
      <img
        class="IE_function_bar_icon"
        src="/Assets/Windows XP High Resolution Icon Pack avec MAOSX/Windows XP High Resolution Icon Pack/Windows XP Icons/IE History.png"
        alt=""
      />
    </div>
    <div class="IE_function_bar_separate"></div>
    <div class="IE_function_bar_button">
      <img
        class="IE_function_bar_icon--margin-1"
        src="/Assets/Windows XP High Resolution Icon Pack avec MAOSX/Windows XP High Resolution Icon Pack/Windows XP Icons/Email.png"
        alt=""
      />
      <div class="IE_function_bar_arrow--margin-11"></div>
    </div>
    <div class="IE_function_bar_button">
      <img
        class="IE_function_bar_icon--margin12"
        src="/Assets/Windows XP High Resolution Icon Pack avec MAOSX/Windows XP High Resolution Icon Pack/Windows XP Icons/Printer.png"
        alt=""
      />
    </div>
    <div class="IE_function_bar_button--disable">
      <img
        class="IE_function_bar_icon"
        src="/Assets/Windows XP High Resolution Icon Pack avec MAOSX/Windows XP High Resolution Icon Pack/Windows XP Icons/IE Edit.png"
        alt=""
      />
    </div>
    <div class="IE_function_bar_button">
      <img
        class="IE_function_bar_icon--margin12"
        src="/Assets/Windows XP High Resolution Icon Pack avec MAOSX/Windows XP High Resolution Icon Pack/Windows XP Icons/Windows Messenger.png"
        alt=""
      />
    </div>
  </section>
  <section class="IE_address_bar">
    <div class="IE_address_bar_title">Адрес</div>
    <div class="IE_address_bar_IE_content">
      <img
        src="/Assets/Windows XP High Resolution Icon Pack avec MAOSX/Windows XP High Resolution Icon Pack/Windows XP Icons/URL.png"
        alt="IE"
        class="IE_address_bar_IE_content_img"
      />
      <input
        type="text"
        id="ie-address-input"
        class="IE_address_bar_IE_content_input"
        value="https://ru.wikipedia.org"
      />
      <img
        src="/Assets/Images/Icons/down-arrow.png"
        alt="dropdown"
        class="IE_address_bar_IE_content_img"
      />
    </div>
    <div class="IE_address_bar_go" id="ie-go-button">
      <img
        class="IE_address_bar_go_img"
        src="/Assets/Windows XP High Resolution Icon Pack avec MAOSX/Windows XP High Resolution Icon Pack/Windows XP Icons/Go.png"
        alt="go"
      /><span class="IE_address_bar_go_text">Переход</span>
    </div>
    <div class="IE_address_bar_separate"></div>
    <div class="IE_address_bar_links">
      <span class="IE_address_bar_links_text">Ссылки</span
      ><img
        class="IE_address_bar_links_img"
        src="/Assets/Images/Icons/side-arrow.png"
        alt="links"
      />
    </div>
  </section>

  <!-- Панель поиска -->
  <div class="IE_search_panel" id="ie-search-panel" style="display: none;">
    <div class="IE_search_header">
      <img
        src="/Assets/Windows XP High Resolution Icon Pack avec MAOSX/Windows XP High Resolution Icon Pack/Windows XP Icons/Search.png"
        alt="search"
        class="IE_search_icon"
      />
      <span class="IE_search_title">Поиск</span>
      <button class="IE_search_close" id="ie-search-close">✕</button>
    </div>
    <div class="IE_search_content">
      <label class="IE_search_label">Поиск по Википедии:</label>
      <input
        type="text"
        id="ie-search-input"
        class="IE_search_input"
        placeholder="Введите запрос..."
      />
      <button class="IE_search_submit" id="ie-search-submit">Найти</button>
      <div class="IE_search_options">
        <label>
          <input type="radio" name="wiki-lang" value="ru" checked> Русская
        </label>
        <label>
          <input type="radio" name="wiki-lang" value="en"> English
        </label>
      </div>
    </div>
  </div>

  <div class="IE_content">
    <iframe
      id="ie-browser-frame"
      class="IE_browser_iframe"
      src="https://ru.wikipedia.org"
      sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-top-navigation"
    ></iframe>
  </div>
  <footer class="IE_footer">
    <div class="IE_footer_status">
      <img
        class="IE_footer_status_img"
        src="/Assets/Windows XP High Resolution Icon Pack avec MAOSX/Windows XP High Resolution Icon Pack/Windows XP Icons/URL.png"
        alt=""
      /><span class="IE_footer_status_text" id="ie-status-text">Готово</span>
    </div>
    <div class="IE_footer_block"></div>
    <div class="IE_footer_block"></div>
    <div class="IE_footer_block"></div>
    <div class="IE_footer_block"></div>
    <div class="IE_footer_right">
      <img
        class="IE_footer_right_img"
        src="/Assets/Windows XP High Resolution Icon Pack avec MAOSX/Windows XP High Resolution Icon Pack/Windows XP Icons/Internet Shortcut.png"
        alt=""
      /><span class="IE_footer_right_text">Интернет</span>
      <div class="IE_footer_right_dots"></div>
    </div>
  </footer>
</div>

<script src="Internet Explorer 6.js"></script>
