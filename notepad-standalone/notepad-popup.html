<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор - Windows XP</title>
  <link rel="stylesheet" href="notepad-popup.css">
</head>
<body>
  <div class="window">
    <div class="window-header-background"></div>
    <header class="window-header">
      <img
        src="../Calculator Icon.png"
        alt="Калькулятор"
      />
      <div class="window-header-title">Калькулятор</div>
      <div class="window-header-buttons">
        <button class="header-button header-button--minimize" title="Свернуть"></button>
        <button class="header-button header-button--maximaze" title="Развернуть"></button>
        <button class="header-button header-button--close" title="Закрыть"></button>
      </div>
    </header>
    <div class="window-content">
      <div class="notepad_body">
        <section class="toolbar">
          <div class="toolbar_OCD">
            <div class="drop_down"><div class="drop_down_label">Правка</div></div>
            <div class="drop_down"><div class="drop_down_label">Вид</div></div>
            <div class="drop_down"><div class="drop_down_label">Справка</div></div>
          </div>
        </section>
        <div class="calculator-input-wrapper">
          <input type="text" class="calculator-display" value="0" readonly>
        </div>
        <div class="calculator-row">
          <div class="calculator-square"></div>
          <button class="calculator-button calculator-button-backspace">

            </svg>
          </button>
          <button class="calculator-button calculator-button-ce">
            <svg xmlns="http://www.w3.org/2000/svg" width="12" height="9" viewBox="0 0 12 9" fill="none">
              <path fill-rule="evenodd" clip-rule="evenodd" d="M1 0H5V1H1V0ZM1 8H0V1H1V8ZM5 8V9H1V8H5ZM5 8V7H6V8H5ZM5 1H6V2H5V1ZM7 0H8H12V1H8V4H11V5H8V8H12V9H8H7V0Z" fill="#FF0000"/>

        </div>
        <div class="calculator-row-2">

            </svg>
          </button>
          <button class="calculator-button calculator-button-num">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="13" viewBox="0 0 16 13" fill="none">

          </button>
          <button class="calculator-button calculator-button-num">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="13" viewBox="0 0 16 13" fill="none">

            </svg>
          </button>
          <button class="calculator-button calculator-button-num">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="13" viewBox="0 0 16 13" fill="none">
              <path fill-rule="evenodd" clip-rule="evenodd" d="M6 2H8V3H6V2ZM6 4H5V3H6V4ZM8 4V5H6V4H8ZM8 4H9V3H8V4ZM11 8V9H9V8H11ZM9 10H8V9H9V10ZM11 10V11H9V10H11ZM11 10H12V9H11V10ZM12 3H11V4H10V5H9V6H8V7H7V8H6V9H5V10H6V9H7V8H8V7H9V6H10V5H11V4H12V3Z" fill="#0000FF"/>

        <div class="calculator-row-4">

              <rect x="7" y="7" width="2" height="1" fill="#FF0000"/>

          </button>
          <button class="calculator-button calculator-button-num">

        <div class="calculator-row-5">
          <button class="calculator-button calculator-button-m-plus">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="9" viewBox="0 0 14 9" fill="none">
              <path fill-rule="evenodd" clip-rule="evenodd" d="M1 0H0V9H1V4H2V6H3V8H4V6H5V4H6V9H7V0H6V2H5V4H4V6H3V4H2V2H1V0ZM12 3H11V5H9V6H11V8H12V6H14V5H12V3Z" fill="#FF0000"/>

  <script src="notepad-popup.js"></script>

</html>
